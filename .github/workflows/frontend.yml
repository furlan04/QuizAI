name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # I client ID/URL servono solo a build-time; valori placeholder bastano per verificare la compilazione
      REACT_APP_AUTH_SERVICE_URL: "http://localhost:5001"
      REACT_APP_QUIZ_SERVICE_URL: "http://localhost:8080"
      REACT_APP_USER_SERVICE_URL: "http://localhost:5002"
      REACT_APP_GOOGLE_CLIENT_ID: ""
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npm run build
