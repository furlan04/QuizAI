services:

  # ── Infrastruttura ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    # Replica set a nodo singolo: necessario per le transazioni MongoDB (sessions/complete)
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Inizializza il replica set al primo avvio, poi verifica che sia pronto
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quizai_auth
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservizi ────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    env_file:
      - ../services/auth-service/.env
    volumes:
      # Persiste le chiavi RSA tra i restart: senza questo, ogni rebuild rigenera
      # le chiavi e invalida tutti i JWT in circolazione (utenti devono ri-loggarsi).
      - auth_keys:/app/keys
    environment:
      MYSQL_URL: "Server=mysql;Port=3306;Database=quizai_auth;Uid=root;Pwd=root;"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      # Lo stack docker è servito in http su localhost: il cookie non può essere Secure
      # (altrimenti il browser non lo invierebbe). In produzione https impostare a true.
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      # Google login (lascia vuoto per disabilitare)
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      # SMTP per email di conferma (vuoto → log in console, dev mode)
      SMTP_HOST:      "${SMTP_HOST:-}"
      SMTP_PORT:      "${SMTP_PORT:-587}"
      SMTP_USER:      "${SMTP_USER:-}"
      SMTP_PASS:      "${SMTP_PASS:-}"
      SMTP_FROM:      "${SMTP_FROM:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-QuizAI}"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5001' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    develop:
      watch:
        - action: sync+restart
          path: ../services/auth-service/src
          target: /app/src

  quiz-service:
    build:
      context: ../services/quiz-service
      dockerfile: Dockerfile
    env_file:
      - ../services/quiz-service/.env
    environment:
      MONGODB_URL: "mongodb://mongodb:27017/?replicaSet=rs0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      AUTH_SERVICE_URL: "http://auth-service:5001"
      AI_AGENT_URL: "http://ai-agent:8000"
      FILE_SERVICE_URL: "http://file-service:8001"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-changeme}"
      # Origine del frontend ammessa da CORS (necessaria per i cookie cross-origin)
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      ai-agent:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    develop:
      watch:
        - action: sync+restart
          path: ../services/quiz-service/src
          target: /app/src

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    env_file:
      - ../services/user-service/.env
    environment:
      MONGODB_URL: "mongodb://mongodb:27017/?replicaSet=rs0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      AUTH_SERVICE_URL: "http://auth-service:5001"
      # Origine del frontend ammessa da CORS (necessaria per i cookie cross-origin)
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5002' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    develop:
      watch:
        - action: sync+restart
          path: ../services/user-service/src
          target: /app/src

  ai-agent:
    build:
      context: ..
      dockerfile: services/ai-agent-service/Dockerfile
    env_file:
      - ../services/ai-agent-service/.env
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      MONGODB_URL: "mongodb://mongodb:27017/?replicaSet=rs0"
      QDRANT_URL: "http://qdrant:6333"
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-changeme}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ../services/ai-agent-service/src
          target: /app/src
        - action: sync
          path: ../shared
          target: /app/shared

  file-service:
    build:
      context: ../services/file-service
      dockerfile: Dockerfile
    environment:
      INTERNAL_API_KEY: "${INTERNAL_API_KEY:-changeme}"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      qdrant:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ../services/file-service/src
          target: /app/src

  # ── Gateway ─────────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    depends_on:
      auth-service:
        condition: service_healthy
      quiz-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5000' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_AUTH_SERVICE_URL: http://localhost:5000
        REACT_APP_QUIZ_SERVICE_URL: http://localhost:5000/quiz
        REACT_APP_USER_SERVICE_URL: http://localhost:5000
        REACT_APP_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  rabbitmq_data:
  mongo_data:
  mysql_data:
  auth_keys:
  qdrant_data:
